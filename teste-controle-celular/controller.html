<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle do Jogo</title>
    <link rel="stylesheet" href="mobile.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <!-- Tela de Permissão -->
    <div id="permission-screen" class="screen active">
        <div class="content-box">
            <h1>Controle Conectado!</h1>
            <p>Precisamos da sua permissão para usar os sensores de movimento (giroscópio) do celular.</p>
            <button id="start-btn">Iniciar Controle</button>
            <p class="error-msg" id="error-msg"></p>
        </div>
    </div>

    <!-- Tela do Controle Principal -->
    <div id="control-screen" class="screen">
        <div class="header">
            <span>Incline para mover o cursor</span>
            <div id="debug-info" style="font-size: 0.8rem; color: #fbbf24; margin-top: 10px;">Giroscópio: Aguardando dados...</div>
        </div>
        <div class="button-container">
            <button id="action-btn">
                <div class="btn-inner"></div>
            </button>
        </div>
    </div>

    <script src="mobile.js"></script>
</body>
</html>
