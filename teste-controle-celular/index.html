<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo com Controle de Celular</title>
    <link rel="stylesheet" href="desktop.css">
    <!-- Load qrcode.js for generating QR code on frontend -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    
    <!-- Tela de Conexão -->
    <div id="connection-screen" class="screen active">
        <div class="glass-panel">
            <h1>Vincular Controle</h1>
            <p>Escaneie o QR Code abaixo com seu celular para usá-lo como controle.</p>
            <div id="qrcode-container"></div>
            <p class="url-hint">Aguardando conexão...</p>
        </div>
    </div>

    <!-- Tela do Jogo -->
    <div id="game-screen" class="screen">
        <div class="header">
            <h2>Área de Testes</h2>
            <span class="status-indicator">Controle Conectado</span>
        </div>
        
        <div class="game-area">
            <!-- Botões espalhados para teste -->
            <button class="target-btn" style="top: 20%; left: 10%;">Botão 1</button>
            <button class="target-btn" style="top: 70%; left: 30%;">Botão 2</button>
            <button class="target-btn" style="top: 40%; left: 80%;">Botão 3</button>
            <button class="target-btn" style="top: 80%; left: 70%;">Botão 4</button>
            <button class="target-btn" style="top: 10%; left: 50%;">Botão 5</button>
        </div>

        <!-- Ponteiro virtual do controle -->
        <div id="virtual-pointer"></div>
    </div>

    <!-- Notificações de log na tela -->
    <div id="toast-container"></div>

    <script src="desktop.js"></script>
</body>
</html>
